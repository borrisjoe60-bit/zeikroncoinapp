- name: Install frontend
  working-directory: frontend
  run: npm install

- name: Build frontend
  working-directory: frontend
  run: npm run build

- name: Install backend
  working-directory: backend
  run: npm install

- name: Build backend
  working-directory: backend
  run: npm run build

- name: Install contracts
  working-directory: contracts
  run: npm install

- name: Test contracts
  working-directory: contracts
  run: npx hardhat test